name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  docker-build:
    name: Docker Build (smoke test)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t claude-demo:ci .

      - name: Smoke test container
        run: |
          docker run -d --name copilot-agent -p 3000:3000 \
            -e NODE_ENV=development \
            claude-demo:ci
          sleep 5
          curl --fail http://localhost:3000/
          docker stop copilot-agent
