name: Deploy

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-22.04
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Strip v prefix from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Debug pushed tags
        run: echo "Pushed tags => ${{ steps.meta.outputs.tags }}"
      
  kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-22.04
    needs: docker
    environment: production

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up kind (Kubernetes in Docker)
        uses: helm/kind-action@v1.10.0
        with:
         cluster_name: kind
         wait: 120s
         
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug tag values
        run: |
          echo "ref_name: ${{ github.ref_name }}"
          echo "docker output version: ${{ needs.docker.outputs.version }}"


      - name: Pull and load Docker image into kind cluster
        run: |
          TAG="${{ needs.docker.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          docker pull ${IMAGE}
          kind load docker-image ${IMAGE} --name kind

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/
              
      - name: Create / update secret from GitHub secrets
        run: |
          kubectl create secret generic copilot-agent-env \
            --from-literal=NODE_ENV=production \
            --from-literal=PORT=3000 \
            --namespace=copilot-agent \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update deployment image to new tag
        run: |
          TAG="${{ needs.docker.outputs.version }}"
          TAG="${TAG#v}"
          kubectl set image deployment/copilot-agent \
            copilot-agent=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG} \
            --namespace=copilot-agent

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/copilot-agent \
            --namespace=copilot-agent \
            --timeout=120s

      - name: Verify pods are running
        run: kubectl get pods -n copilot-agent
