apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot-agent
  namespace: copilot-agent
  labels:
    app: copilot-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: copilot-agent
  template:
    metadata:
      labels:
        app: copilot-agent
    spec:
      containers:
        - name: copilot-agent
          # For local dev use the image built by docker-compose / docker build
          # On Docker Desktop with local k8s, imagePullPolicy: Never uses the local image
          image: claude-demo:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: copilot-agent-env
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
